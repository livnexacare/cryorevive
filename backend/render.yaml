services:
  - type: web
    name: cryorevive-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: BOOKING_EMAIL_FROM
        sync: false
      - key: SUPPORT_EMAIL_FROM
        sync: false
      - key: SUPPORT_DEST_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://cryo-revive-main.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://cryo-revive-main.vercel.app
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        value: cryorevive-media
      - key: R2_PUBLIC_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RESEND_FORCE_RECIPIENT
        sync: false
      - key: WHATSAPP_NOTIFY_NUMBERS
        sync: false
